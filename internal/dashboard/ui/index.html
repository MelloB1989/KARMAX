<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARMAX — Agent Harness</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js" integrity="sha384-G6P5MbevMyrJg3vdtnNBbSl7H4rPd6Ksu/VtXBNRInFx5CF6NuiRhfiENX+cYYPP" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body x-data="karmax()" x-init="init()">
    <header>
        <div class="logo">
            <span class="logo-icon">⬡</span>
            <span class="logo-text">KARMAX</span>
            <span class="logo-sub">Agent Harness</span>
        </div>
        <nav>
            <a href="#" :class="{ active: tab === 'dashboard' }" @click.prevent="tab = 'dashboard'">Dashboard</a>
            <a href="#" :class="{ active: tab === 'agents' }" @click.prevent="tab = 'agents'">Agents</a>
            <a href="#" :class="{ active: tab === 'scheduler' }" @click.prevent="tab = 'scheduler'">Scheduler</a>
            <a href="#" :class="{ active: tab === 'webhooks' }" @click.prevent="tab = 'webhooks'">Webhooks</a>
            <a href="#" :class="{ active: tab === 'tools' }" @click.prevent="tab = 'tools'">Tools</a>
        </nav>
        <div class="status-bar">
            <span class="status-dot" :class="connected ? 'connected' : 'disconnected'"></span>
            <span x-text="connected ? 'Live' : 'Disconnected'"></span>
        </div>
    </header>

    <main>
        <!-- Dashboard -->
        <div x-show="tab === 'dashboard'" x-cloak>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" x-text="agents.length"></div>
                    <div class="stat-label">Agents</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" x-text="agents.filter(a => a.status === 'running').length"></div>
                    <div class="stat-label">Running</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" x-text="jobs.length"></div>
                    <div class="stat-label">Jobs</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" x-text="events.length"></div>
                    <div class="stat-label">Events</div>
                </div>
            </div>

            <div class="grid-2">
                <div class="panel">
                    <h2>Agent Status</h2>
                    <div class="agent-grid">
                        <template x-for="a in agents" :key="a.id">
                            <div class="agent-card" @click="tab = 'agents'; selectedAgent = a.id">
                                <div class="agent-header">
                                    <span class="status-badge" :class="a.status" x-text="a.status"></span>
                                    <span class="agent-name" x-text="a.name"></span>
                                </div>
                                <div class="agent-meta">
                                    <span x-text="'Restarts: ' + a.restarts"></span>
                                    <span x-text="a.uptime || 'idle'"></span>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <div class="panel">
                    <h2>Live Activity</h2>
                    <div class="event-feed" id="event-feed">
                        <template x-for="e in liveEvents.slice(-30).reverse()" :key="e.id">
                            <div class="event-item">
                                <span class="event-time" x-text="formatTime(e.timestamp)"></span>
                                <span class="event-kind" x-text="e.kind"></span>
                                <span class="event-agent" x-text="e.agent_id || ''"></span>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>

        <!-- Agents -->
        <div x-show="tab === 'agents'" x-cloak>
            <template x-if="!selectedAgent">
                <div>
                    <h2>All Agents</h2>
                    <table class="data-table">
                        <thead>
                            <tr><th>ID</th><th>Name</th><th>Status</th><th>Model</th><th>Restarts</th><th>Uptime</th><th>Actions</th></tr>
                        </thead>
                        <tbody>
                            <template x-for="a in agents" :key="a.id">
                                <tr>
                                    <td><a href="#" @click.prevent="selectedAgent = a.id" x-text="a.id"></a></td>
                                    <td x-text="a.name"></td>
                                    <td><span class="status-badge" :class="a.status" x-text="a.status"></span></td>
                                    <td x-text="a.def?.model || ''"></td>
                                    <td x-text="a.restarts"></td>
                                    <td x-text="a.uptime || '-'"></td>
                                    <td>
                                        <button class="btn btn-sm" @click="agentAction(a.id, 'start')">Start</button>
                                        <button class="btn btn-sm btn-danger" @click="agentAction(a.id, 'stop')">Stop</button>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>
            <template x-if="selectedAgent">
                <div>
                    <button class="btn" @click="selectedAgent = null">&larr; Back</button>
                    <template x-for="a in agents.filter(a => a.id === selectedAgent)" :key="a.id">
                        <div class="agent-detail">
                            <h2 x-text="a.name"></h2>
                            <div class="detail-grid">
                                <div class="detail-item"><strong>Status:</strong> <span class="status-badge" :class="a.status" x-text="a.status"></span></div>
                                <div class="detail-item"><strong>Model:</strong> <span x-text="a.def?.model"></span></div>
                                <div class="detail-item"><strong>Provider:</strong> <span x-text="a.def?.provider"></span></div>
                                <div class="detail-item"><strong>Restarts:</strong> <span x-text="a.restarts"></span></div>
                                <div class="detail-item"><strong>Started:</strong> <span x-text="a.started_at || 'Never'"></span></div>
                                <div class="detail-item"><strong>Uptime:</strong> <span x-text="a.uptime || '-'"></span></div>
                            </div>
                            <div class="action-bar">
                                <button class="btn" @click="agentAction(a.id, 'start')">Start</button>
                                <button class="btn" @click="agentAction(a.id, 'pause')">Pause</button>
                                <button class="btn" @click="agentAction(a.id, 'resume')">Resume</button>
                                <button class="btn" @click="agentAction(a.id, 'restart')">Restart</button>
                                <button class="btn btn-danger" @click="agentAction(a.id, 'stop')">Stop</button>
                            </div>
                            <div class="panel" style="margin-top: 1rem">
                                <h3>Trigger Agent</h3>
                                <textarea x-model="triggerPayload" placeholder='{"key": "value"}' rows="3"></textarea>
                                <button class="btn" @click="triggerAgent(a.id)">Send Trigger</button>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
        </div>

        <!-- Scheduler -->
        <div x-show="tab === 'scheduler'" x-cloak>
            <h2>Scheduled Jobs</h2>
            <table class="data-table">
                <thead>
                    <tr><th>Name</th><th>Cron</th><th>Agent</th><th>Last Run</th><th>Next Run</th><th>Runs</th><th>Actions</th></tr>
                </thead>
                <tbody>
                    <template x-for="j in jobs" :key="j.id">
                        <tr>
                            <td x-text="j.name"></td>
                            <td><code x-text="j.cron"></code></td>
                            <td x-text="j.agent_id"></td>
                            <td x-text="j.last_run ? formatTime(j.last_run) : 'Never'"></td>
                            <td x-text="j.next_run ? formatTime(j.next_run) : '-'"></td>
                            <td x-text="j.run_count"></td>
                            <td>
                                <button class="btn btn-sm" @click="runJob(j.id)">Run Now</button>
                                <button class="btn btn-sm btn-danger" @click="deleteJob(j.id)">Delete</button>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <!-- Webhooks -->
        <div x-show="tab === 'webhooks'" x-cloak>
            <h2>Webhook Routes</h2>
            <table class="data-table">
                <thead>
                    <tr><th>Path</th><th>Method</th><th>Agent</th><th>Secret</th></tr>
                </thead>
                <tbody>
                    <template x-for="r in webhookRoutes" :key="r.path">
                        <tr>
                            <td><code x-text="r.path"></code></td>
                            <td x-text="r.method"></td>
                            <td x-text="r.agent_id"></td>
                            <td x-text="r.secret ? '***' : 'None'"></td>
                        </tr>
                    </template>
                </tbody>
            </table>

            <h2 style="margin-top: 2rem">Recent Events</h2>
            <div class="event-feed">
                <template x-for="e in webhookEvents" :key="e.id">
                    <div class="event-item">
                        <span class="event-time" x-text="formatTime(e.received_at)"></span>
                        <span x-text="e.method"></span>
                        <span x-text="e.route"></span>
                    </div>
                </template>
            </div>
        </div>

        <!-- Tools -->
        <div x-show="tab === 'tools'" x-cloak>
            <h2>Registered Tools</h2>
            <div class="tools-grid">
                <template x-for="t in tools" :key="t.name">
                    <div class="tool-card">
                        <h3 x-text="t.name"></h3>
                        <p x-text="t.description"></p>
                    </div>
                </template>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>

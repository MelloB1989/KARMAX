name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: build & vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-ed:"; echo "$unformatted"; exit 1
          fi

      # CGO is required for mattn/go-sqlite3 (memory/state store).
      - name: go vet
        env:
          CGO_ENABLED: "1"
        run: go vet ./...

      - name: build
        env:
          CGO_ENABLED: "1"
        run: go build ./...

      - name: test
        env:
          CGO_ENABLED: "1"
        run: go test ./...
